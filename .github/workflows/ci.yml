name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: dist

  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose config
      - name: Build production image
        run: docker build -t robotics-twin:ci .
      - name: Start production container
        run: docker run -d --name robotics-twin -p 8080:80 robotics-twin:ci
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if wget -qO- http://localhost:8080/healthz | grep -q ok; then
              echo "healthy"; exit 0
            fi
            sleep 2
          done
          echo "container did not become healthy"; docker logs robotics-twin; exit 1
      - name: Verify SPA and static robotics assets are served
        run: |
          wget -qO- http://localhost:8080/ | grep -qi 'id="root"'
          wget -q --spider http://localhost:8080/robot/6_dof_arm.urdf
          wget -q --spider http://localhost:8080/config/key.config.json
      - name: Assert no secrets baked into the image
        run: |
          ! docker run --rm robotics-twin:ci sh -c 'ls -a /usr/share/nginx/html' | grep -E '(^|/)\.env$'
      - name: Stop container
        if: always()
        run: docker rm -f robotics-twin || true
