# nginx configuration for the robotics digital twin (static SPA).
# Provides SPA routing, gzip, sane caching, security headers, and a health
# endpoint. Contains NO application/robotics logic.

server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # --- gzip ----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # --- security headers ----------------------------------------------------
    # Applied globally. The caching locations below use only the `expires`
    # directive (not add_header), so these headers stay inherited everywhere.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- health endpoint (Docker / orchestrator liveness) --------------------
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # --- content-hashed build output: cache aggressively ---------------------
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # --- runtime robotics data: always revalidate so redeploys are picked up -
    location /robot/ {
        expires -1;
        try_files $uri =404;
    }
    location /config/ {
        expires -1;
        try_files $uri =404;
    }

    # --- never cache the app shell -------------------------------------------
    location = /index.html {
        expires -1;
    }

    # --- SPA fallback: unknown routes serve the app shell --------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
